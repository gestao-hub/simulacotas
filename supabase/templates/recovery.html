<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redefinir senha</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f7;padding:40px 20px">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
          <tr>
            <td style="background:linear-gradient(135deg,#0D1B4B,#152260);padding:32px 40px;text-align:center">
              <div style="display:inline-block;background-color:#ffffff;border-radius:12px;padding:12px 24px"><img src="https://simulacotas.vercel.app/assets/logo.png" alt="SimulaCotas" height="80" style="height:80px"></div>
            </td>
          </tr>
          <tr>
            <td style="padding:40px">
              <h1 style="margin:0 0 8px;font-size:24px;font-weight:700;color:#1e293b">Redefinir sua senha</h1>
              <p style="margin:0 0 24px;font-size:16px;color:#64748b;line-height:1.6">
                Recebemos uma solicitação para redefinir a senha da sua conta SimulaCotas. Clique no botão abaixo para criar uma nova senha.
              </p>
              <table cellpadding="0" cellspacing="0" style="margin:0 auto">
                <tr>
                  <td style="background-color:#0D1B4B;border-radius:12px;padding:14px 32px">
                    <a href="{{ .ConfirmationURL }}" style="color:#CCEE00;text-decoration:none;font-size:16px;font-weight:700">Redefinir senha</a>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;font-size:13px;color:#94a3b8;line-height:1.5">Se você não solicitou esta alteração, ignore este email. O link expira em 1 hora.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 40px;background-color:#f8fafc;border-top:1px solid #f1f5f9;text-align:center">
              <p style="margin:0;font-size:12px;color:#94a3b8">SimulaCotas — Simulações de consórcio profissionais</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
